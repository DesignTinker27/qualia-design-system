<!DOCTYPE html>

            font-weight: 600;
            padding: 12px 24px;
            border: 2px solid #6DC278;
            border-radius: 8px;
            display: inline-block;
            margin-top: 20px;
            transition: all 0.2s ease;
        }
        a:hover {
            background: #6DC278;
            color: white;
            transform: translateY(-2px);
